# ─────────────────────────────────────────────────────────────────────────────
# Sterling Jewellers — Netlify build configuration
# Place this file at the ROOT of the repository (next to client/ and server/).
# ─────────────────────────────────────────────────────────────────────────────

[build]
  base    = "client"                  # Netlify cds into client/ before building
  command = "npm install && npm run build"
  publish = ".next"                   # relative to base (= client/.next)

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# Essential Next.js plugin — handles SSR, ISR, image optimisation, middleware
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache hashed Next.js static assets forever
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ── Redirects ─────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "http://sterlingjewellers.co.uk/*"
  to     = "https://sterlingjewellers.co.uk/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.sterlingjewellers.co.uk/*"
  to     = "https://sterlingjewellers.co.uk/:splat"
  status = 301
  force  = true
